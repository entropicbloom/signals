---
layout: default
---

<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">
          {% if page.status == 'ongoing' %}
            Ongoing
          {% else %}
            {{ page.date | date: "%B %-d, %Y" }}
          {% endif %}
        </p>
        {% if page.tags %}
        <div class="post-tags">
            {% for tag in page.tags %}
            <a href="{{ '/entries' | relative_url }}?tag={{ tag | slugify }}" class="post-tag">{{ tag }}</a>
            {% endfor %}
        </div>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content }}
    </div>
</article>
